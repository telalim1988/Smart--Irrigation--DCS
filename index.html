<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WWTP AI SCADA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="main-header">
    <div>
        <h2>WWTP AI Simulator</h2>
        <span>Digital Twin SCADA</span>
    </div>
    <div>
        <span class="status">System READY</span>
    </div>
</div>

<!-- NAV -->
<div class="nav">
    <button onclick="openTab('simulation')">Simulation</button>
    <button onclick="openTab('operations')">Operations</button>
</div>

<!-- ================= SIMULATION ================= -->
<div id="simulation" class="panel active">

<div class="section">

<h3>Input Data</h3>

<div class="grid">

<input id="flow" placeholder="Flow (m3/d)">
<input id="cod" placeholder="COD">
<input id="tkn" placeholder="TKN">
<input id="temp" placeholder="Temperature">

<input id="volume" placeholder="Tank Volume">
<input id="srt" placeholder="SRT">

<input id="xr" placeholder="XR">
<input id="doTarget" placeholder="DO Target">

<input id="zones" placeholder="Zones">

<input id="clarifierArea" placeholder="Clarifier Area">
<input id="clarifierNumber" placeholder="No. Clarifiers">

<input id="plantNH4" placeholder="Real NH4">
<input id="plantMLSS" placeholder="Real MLSS">
<input id="plantSLR" placeholder="Real SLR">

</div>

<button onclick="runSimulation()">Run Simulation</button>

</div>

</div>

<!-- ================= OPERATIONS ================= -->
<div id="operations" class="panel">

<div class="kpi-row">

<div class="kpi-card">
<h3>NH4</h3>
<p id="kpiNH4">--</p>
</div>

<div class="kpi-card">
<h3>Energy</h3>
<p id="kpiEnergy">--</p>
</div>

<div class="kpi-card">
<h3>SRT</h3>
<p id="kpiSRT">--</p>
</div>

<div class="kpi-card">
<h3>MLSS</h3>
<p id="kpiMLSS">--</p>
</div>

</div>

<div class="section">
<h3>Results</h3>
<div id="results"></div>
</div>

<div class="section">
<h3>Flowsheet</h3>

<pre id="flowsheet">

WWTP PROCESS

Influent → Aeration → Clarifier → Effluent

MLSS: --
SRT: --
NH4: --

</pre>

</div>

</div>

<script src="main.js"></script>

</body>
</html>
